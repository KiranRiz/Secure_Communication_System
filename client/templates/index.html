<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Animated background particles -->
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <div class="auth-container">

        <div class="auth-logo">
            <div class="lock-icon">&#128274;</div>
            <h1>SecureChat</h1>
            <p>End-to-End Encrypted &bull; Zero Knowledge Server</p>
        </div>

        <div class="tabs">
            <button class="active" onclick="showTab('login')">Sign In</button>
            <button onclick="showTab('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <div class="field">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
            <div class="divider"><span>or</span></div>
            <button class="btn-demo" onclick="enterDemo()">&#9654; Try Demo (No Server Needed)</button>
        </div>

        <!-- Register Form -->
        <div id="register-form" style="display:none">
            <div class="field">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Choose a password" autocomplete="new-password">
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="Re-enter your password" autocomplete="new-password">
            </div>
            <button class="btn-primary" onclick="handleRegister()">Create Account</button>
        </div>

        <div id="message" class="message-box"></div>

        <!-- Security badges -->
        <div class="security-badges">
            <span class="badge">&#128737; AES-256-GCM</span>
            <span class="badge">&#128273; ECDH P-256</span>
            <span class="badge">&#128683; Zero Knowledge</span>
        </div>

    </div>

    <script>
        function showTab(tab) {
            document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tabs button').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
        }

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className   = 'message-box ' + type;
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) { showMessage('Please fill in all fields', 'error'); return; }
            try {
                const res  = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = `/chat?username=${username}`; }, 800);
                } else { showMessage(data.message || 'Login failed', 'error'); }
            } catch (e) { showMessage('Cannot reach server', 'error'); }
        }

        async function handleRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm  = document.getElementById('reg-confirm').value;
            if (!username || !password) { showMessage('Please fill in all fields', 'error'); return; }
            if (password !== confirm)   { showMessage('Passwords do not match', 'error'); return; }
            if (password.length < 6)    { showMessage('Password must be at least 6 characters', 'error'); return; }
            try {
                const res  = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Account created! Please sign in.', 'success');
                    setTimeout(() => showTab('login'), 1200);
                } else { showMessage(data.message || 'Registration failed', 'error'); }
            } catch (e) { showMessage('Cannot reach server', 'error'); }
        }

        // TODO: Remove demo mode when server integration is complete
        function enterDemo() {
            const name = document.getElementById('login-username').value.trim() || 'DemoUser';
            window.location.href = `/chat?username=${name}&demo=1`;
        }
    </script>

</body>
</html>
